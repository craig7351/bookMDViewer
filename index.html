<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Viewer</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="toolbar">
      <button id="open-btn" class="icon-btn" title="Open file (Ctrl+O)" aria-label="Open file">📂</button>
      <button id="font-dec" class="icon-btn" title="Decrease font (Ctrl+-)" aria-label="Decrease font size">A−</button>
      <button id="font-inc" class="icon-btn" title="Increase font (Ctrl++)" aria-label="Increase font size">A+</button>
      <button id="save-btn" title="Save (Ctrl+S)" aria-label="Save" hidden>💾 Save</button>
      <button id="export-btn" title="Export to HTML" aria-label="Export to HTML">⬇ HTML</button>
      <button id="edit-toggle" title="Toggle edit mode (Ctrl+E)" aria-label="Toggle edit mode">✎ Edit</button>
      <button id="toc-toggle" title="Toggle outline (Ctrl+\)" aria-label="Toggle outline">☰</button>
    </div>
    <div id="toast" hidden></div>
    <div id="find-bar" hidden>
      <input id="find-input" type="text" placeholder="Find…" spellcheck="false" />
      <span id="find-count"></span>
      <button id="find-prev" title="Previous (Shift+Enter)" aria-label="Previous match">↑</button>
      <button id="find-next" title="Next (Enter)" aria-label="Next match">↓</button>
      <button id="find-close" title="Close (Esc)" aria-label="Close find">✕</button>
    </div>
    <div id="layout">
      <nav id="toc" aria-label="Table of contents"></nav>
      <textarea
        id="editor"
        spellcheck="false"
        placeholder="Markdown source…"
      ></textarea>
      <article id="content" class="markdown-body">
        <div class="empty-state">
          <h1>Markdown Viewer</h1>
          <p>Drag a <code>.md</code> file here, or <a id="empty-open" href="#">open one</a>.</p>
          <div id="recent-list"></div>
        </div>
      </article>
    </div>

    <div id="close-modal" hidden>
      <div class="modal-box">
        <p>有未存檔的變更,要在關閉前儲存嗎?</p>
        <div class="modal-actions">
          <button id="modal-save">儲存並關閉</button>
          <button id="modal-discard">不儲存關閉</button>
          <button id="modal-cancel">取消</button>
        </div>
      </div>
    </div>
  </body>
</html>
